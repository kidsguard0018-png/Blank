<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System X</title>

<style>
body{
  margin:0;
  background:#000;
  color:#00ffcc;
  font-family:monospace;
  overflow:hidden;
  text-align:center;
}

/* glow cursor */
.cursor{
  width:20px;height:20px;
  border-radius:50%;
  position:fixed;
  background:#00ffcc;
  pointer-events:none;
  box-shadow:0 0 20px #00ffcc;
}

/* center box */
.box{
  margin-top:80px;
}

#typing{
  border-right:2px solid #00ffcc;
  display:inline-block;
  padding-right:5px;
}

/* button */
button{
  margin-top:20px;
  padding:12px 25px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
  font-size:18px;
}

/* hidden */
.hidden{display:none;}

/* image */
img{
  width:260px;
  border-radius:15px;
  margin-top:20px;
  transition:1s;
}

/* canvas */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}
</style>

</head>
<body>

<canvas id="bg"></canvas>
<div class="cursor" id="cur"></div>

<div class="box">

<h1>💻 ACCESS REQUIRED</h1>
<div id="typing"></div><br>

<button onclick="unlock()">UNLOCK 🔓</button>

<div id="main" class="hidden">

<h2>💍 SYSTEM ACTIVE</h2>

<img id="img" src="p1.jpg">

<p>CORE MODULE LOADED...</p>

</div>

</div>

<audio id="music" src="m.mp3"></audio>

<script>

/* cursor */
document.addEventListener("mousemove",e=>{
 let c=document.getElementById("cur");
 c.style.left=e.clientX+"px";
 c.style.top=e.clientY+"px";
});

/* typing */
let t="Authenticating...\nDecrypting...\nPreparing Experience...";
let i=0;
function type(){
 if(i<t.length){
  document.getElementById("typing").innerHTML+=t[i];
  i++;
  setTimeout(type,35);
 }
}
type();

/* unlock */
function unlock(){
 document.getElementById("main").style.display="block";
 document.getElementById("music").play();
}

/* slider with zoom */
let arr=["p1.jpg","p2.jpg","p3.jpg","p4.jpg"];
let ind=0;
setInterval(()=>{
 ind=(ind+1)%arr.length;
 let im=document.getElementById("img");
 im.style.transform="scale(1.2)";
 setTimeout(()=>{
  im.src=arr[ind];
  im.style.transform="scale(1)";
 },400);
},2500);

/* particles glow */
let c=document.getElementById("bg");
let x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let prt=[];
function gen(){
 for(let i=0;i<60;i++){
  prt.push({
   x:Math.random()*c.width,
   y:Math.random()*c.height/2,
   dx:(Math.random()-0.5)*7,
   dy:(Math.random()-0.5)*7,
   l:120
  });
 }
}

function draw(){
 x.fillStyle="rgba(0,0,0,0.15)";
 x.fillRect(0,0,c.width,c.height);

 prt.forEach((p,i)=>{
  x.fillStyle="#00ffcc";
  x.shadowBlur=10;
  x.shadowColor="#00ffcc";
  x.fillRect(p.x,p.y,2,2);

  p.x+=p.dx;
  p.y+=p.dy;
  p.l--;

  if(p.l<=0){
   prt.splice(i,1);
  }
 });

 requestAnimationFrame(draw);
}

setInterval(gen,700);
draw();

/* background stars */
let stars=[];
for(let i=0;i<100;i++){
 stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight});
}

setInterval(()=>{
 stars.forEach(s=>{
  x.fillStyle="white";
  x.fillRect(s.x,s.y,1,1);
 });
},100);
